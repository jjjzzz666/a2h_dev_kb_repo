name: Add repo2 - docs
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      - name: 配置Git
        run: |
          git config --global user.name "jjjzzz666"
          git config --global user.email "jjjzzz666@users.noreply.github.com"

      # 🔥 追加第二个仓库，不清空原有文件！
      - name: 下载 repo2 (openharmony-docs)
        run: |
          mkdir -p temp
          curl -L https://github.com/openharmony/docs/archive/refs/heads/master.tar.gz | tar xz --strip 1 -C temp

          # 只保留源码文本，无大文件、无LFS
          find temp -type f ! -name "*.java" ! -name "*.js" ! -name "*.ts" ! -name "*.md" ! -name "*.json" ! -name "*.xml" ! -name "*.py" ! -name "*.cpp" ! -name "*.h" -delete
          find temp -type d -empty -delete

          mv temp openharmony-docs

      - name: 提交推送
        run: |
          git add .
          git commit -m "add repo2: openharmony-docs"
          git push origin main
