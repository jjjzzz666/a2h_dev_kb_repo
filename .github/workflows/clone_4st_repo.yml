name: Add repo4 - HarmonyOS_Samples-guide-snippets
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      - name: 配置Git
        run: |
          git config --global user.name "jjjzzz666"
          git config --global user.email "jjjzzz666@users.noreply.github.com"

      - name: 下载 repo4 (GitCode)
        run: |
          git clone https://gitcode.com/HarmonyOS_Samples/guide-snippets.git --depth=1 temp
          rm -rf temp/.git

          # 只保留源码，无大文件、无LFS
          find temp -type f ! -name "*.java" ! -name "*.js" ! -name "*.ts" ! -name "*.md" ! -name "*.json" ! -name "*.xml" ! -name "*.py" ! -name "*.cpp" ! -name "*.h" -delete
          find temp -type d -empty -delete

          mv temp HarmonyOS_Samples-guide-snippets

      - name: 提交推送
        run: |
          git add .
          git commit -m "add repo4: HarmonyOS_Samples-guide-snippets"
          git push origin main
