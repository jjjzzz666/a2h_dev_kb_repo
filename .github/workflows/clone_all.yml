name: Sync ALL 4 Repos (FINAL)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      - name: Git 配置
        run: |
          git config --global user.name "jjjzzz666"
          git config --global user.email "jjjzzz666@users.noreply.github.com"

      # ==============================================
      # 1. 仓库一：openharmony-applications_app_samples
      # ==============================================
      - name: 下载仓库一
        run: |
          rm -rf openharmony-applications_app_samples
          mkdir -p temp
          curl -L https://github.com/openharmony/applications_app_samples/archive/refs/heads/master.tar.gz | tar xz --strip 1 -C temp
          find temp -size +10M -delete
          find temp -type d -empty -delete
          mv temp openharmony-applications_app_samples

      - name: 提交仓库一
        run: |
          git add .
          git commit -m "sync repo1"
          git push origin main

      # ==============================================
      # 2. 仓库二：openharmony-docs
      # ==============================================
      - name: 下载仓库二
        run: |
          rm -rf openharmony-docs
          mkdir -p temp
          curl -L https://github.com/openharmony/docs/archive/refs/heads/master.tar.gz | tar xz --strip 1 -C temp
          find temp -size +10M -delete
          find temp -type d -empty -delete
          mv temp openharmony-docs

      - name: 提交仓库二
        run: |
          git add .
          git commit -m "sync repo2"
          git push origin main

      # ==============================================
      # 3. 仓库三：openharmony-interface_sdk-js
      # ==============================================
      - name: 下载仓库三
        run: |
          rm -rf openharmony-interface_sdk-js
          mkdir -p temp
          curl -L https://github.com/openharmony/interface_sdk-js/archive/refs/heads/master.tar.gz | tar xz --strip 1 -C temp
          find temp -size +10M -delete
          find temp -type d -empty -delete
          mv temp openharmony-interface_sdk-js

      - name: 提交仓库三
        run: |
          git add .
          git commit -m "sync repo3"
          git push origin main

      # ==============================================
      # 4. 仓库四：HarmonyOS_Samples-guide-snippets
      # ==============================================
      - name: 下载仓库四
        run: |
          rm -rf HarmonyOS_Samples-guide-snippets
          git clone https://gitcode.com/HarmonyOS_Samples/guide-snippets.git --depth=1 temp
          rm -rf temp/.git
          find temp -size +10M -delete
          find temp -type d -empty -delete
          mv temp HarmonyOS_Samples-guide-snippets

      - name: 提交仓库四
        run: |
          git add .
          git commit -m "sync repo4"
          git push origin main
