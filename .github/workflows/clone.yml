name: Sync FINAL CLEAN
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      - name: 重建干净分支 + 清理所有
        run: |
          git config --global user.name "jjjzzz666"
          git config --global user.email "jjjzzz666@users.noreply.github.com"
          git checkout --orphan newbranch
          rm -rf ./*
          rm -f .gitattributes .gitmodules

      # 只下载 纯文本代码，删除 99% 大文件/二进制
      - name: 下载并只保留源码
        run: |
          mkdir -p temp
          curl -L https://github.com/openharmony/applications_app_samples/archive/refs/heads/master.tar.gz | tar xz --strip 1 -C temp

          # 🔥 只保留文本代码，其他全部删除（核心！）
          find temp -type f ! -name "*.java" ! -name "*.js" ! -name "*.ts" ! -name "*.md" ! -name "*.json" ! -name "*.xml" ! -name "*.py" ! -name "*.cpp" ! -name "*.h" -delete

          # 清理空目录
          find temp -type d -empty -delete
          mv temp openharmony-applications_app_samples

      # 强制推送全新干净仓库
      - name: 强制覆盖推送
        run: |
          git add .
          git commit -m "pure source code only"
          git branch -M newbranch main
          git push origin main --force
